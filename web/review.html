<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Histomap — reconciliation review</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Histomap timeline">
        <svg class="brand-mark" viewBox="0 0 36 36" aria-hidden="true"><path d="M5 6h7v24H5zM15 11h7v19h-7zM25 3h7v27h-7z"/></svg>
        <span>Histomap</span>
      </a>
      <nav aria-label="Main navigation">
        <a href="/">Timeline</a>
        <a href="/review" aria-current="page">Review</a>
        <a href="/docs">API</a>
      </nav>
    </header>
    <section class="review-toolbar">
      <div><p class="eyebrow">Editorial workspace</p><h1>Reconciliation review</h1></div>
      <div class="controls">
        <button id="apply-decisions" class="action-button" type="button">Apply review decisions</button>
        <button id="build-data" class="action-button" type="button">Rebuild timeline</button>
        <span id="job-status" aria-live="polite"></span>
      </div>
    </section>
    <main class="review-main">
      <section id="review-card" class="review-card" aria-live="polite">Loading review queue…</section>
      <aside class="details review-progress">
        <h2>Progress</h2>
        <p id="review-progress">Loading…</p>
        <p id="decision-status" class="decision-status" role="status" aria-live="assertive"></p>
        <p>Keyboard: <kbd>1</kbd>–<kbd>5</kbd> accept, <kbd>R</kbd> keep as separate entity, <kbd>S</kbd> defer.</p>
      </aside>
    </main>
    <script type="module" src="/static/review.js"></script>
  </body>
</html>
