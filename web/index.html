<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Histomap — world polities through time</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Histomap timeline">
        <svg class="brand-mark" viewBox="0 0 36 36" aria-hidden="true"><path d="M5 6h7v24H5zM15 11h7v19h-7zM25 3h7v27h-7z"/></svg>
        <span>Histomap</span>
      </a>
      <nav aria-label="Main navigation">
        <a href="/" aria-current="page">Timeline</a>
        <a href="/review">Review</a>
        <a href="/docs">API</a>
      </nav>
    </header>
    <section class="timeline-toolbar" aria-label="Timeline controls">
      <p class="toolbar-intro">Time runs left to right; thickness represents estimated historical weight. Select a geographic lane heading to collapse it.</p>
      <div class="controls">
        <label>Find entity
          <input id="entity-search" type="search" list="entity-options" placeholder="e.g. Hittite Empire" autocomplete="off">
          <datalist id="entity-options"></datalist>
        </label>
        <label>Detail
          <select id="visibility">
            <option value="global">Global overview</option>
            <option value="regional">Regional detail</option>
            <option value="detailed">Full dataset</option>
          </select>
        </label>
        <label>Reading
          <select id="reading-level">
            <option value="adult">Adult</option>
            <option value="child">Child</option>
          </select>
        </label>
        <label>Historical grouping <select id="historical-group"><option value="">All groupings</option></select></label>
        <label>Continent <select id="continent"><option value="">All continents</option></select></label>
        <label>Present country <select id="country"><option value="">All countries</option></select></label>
        <label>Era
          <select id="era-preset">
            <option value="full">Full timeline</option>
            <option value="bronze">Bronze Age</option>
            <option value="iron">Iron Age</option>
            <option value="classical">Classical antiquity</option>
            <option value="medieval">Medieval</option>
            <option value="early-modern">Early modern</option>
            <option value="modern">Modern</option>
            <option value="custom">Custom range</option>
          </select>
        </label>
        <label>From <input id="year-start" type="number" value="-8000" step="100"></label>
        <label>To <input id="year-end" type="number" value="2026" step="100"></label>
        <button id="apply" type="button">Redraw</button>
        <span id="summary" aria-live="polite"></span>
      </div>
      <div class="confidence-legend" aria-label="Date confidence legend">
        <span>Date confidence</span>
        <i class="high"></i> High
        <i class="medium"></i> Medium
        <i class="low"></i> Low
        <i class="legendary"></i> Legendary
      </div>
      <div id="color-legend" class="color-legend" aria-label="Geographic color legend"></div>
    </section>
    <main class="timeline-main">
      <div id="chart" class="chart" role="img" aria-label="Horizontal timeline of historical polities"></div>
      <button id="detail-backdrop" class="detail-backdrop" type="button" aria-label="Close entity details" tabindex="-1"></button>
      <aside id="details" class="details detail-drawer" aria-live="polite" aria-hidden="true"></aside>
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
