<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Histomap — world polities through time</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header>
      <p class="eyebrow">An atlas of political history</p>
      <h1>Histomap</h1>
      <p class="intro">Time runs from left to right. Band thickness reflects each polity’s estimated historical weight.</p>
      <p><a href="/review">Open reconciliation review</a></p>
      <div class="controls">
        <label>Detail
          <select id="visibility">
            <option value="global">Global overview</option>
            <option value="regional">Regional detail</option>
            <option value="detailed">Full dataset</option>
          </select>
        </label>
        <label>Continent <select id="continent"><option value="">All continents</option></select></label>
        <label>Present country <select id="country"><option value="">All countries</option></select></label>
        <label>From <input id="year-start" type="number" value="-1000" step="100"></label>
        <label>To <input id="year-end" type="number" value="2100" step="100"></label>
        <button id="apply" type="button">Redraw</button>
        <span id="summary" aria-live="polite"></span>
      </div>
      <div class="confidence-legend" aria-label="Date confidence legend">
        <span>Date confidence</span>
        <i class="high"></i> High
        <i class="medium"></i> Medium
        <i class="low"></i> Low
        <i class="legendary"></i> Legendary
      </div>
    </header>
    <main>
      <div id="chart" class="chart" role="img" aria-label="Horizontal timeline of historical polities"></div>
      <aside id="details" class="details" aria-live="polite">
        <p>Hover or focus a band to inspect a polity.</p>
      </aside>
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
